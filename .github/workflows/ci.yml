name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile (webpack)
        run: npm run compile

      - name: Package .vsix
        run: npm run vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: smods-tools-vsix
          path: '*.vsix'
          retention-days: 30
